version: '3.8'

services:
  offboarding:
    build: .
    image: cladtek/offboarding:latest
    container_name: offboarding_app
    user: root
    networks:
      - internal
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ALGORITHM=${ALGORITHM}
      - EMAIL_SENDER=${EMAIL_SENDER}
      - AD_PORT=${AD_PORT}
      - EMAIL_RECEIVER=${EMAIL_RECEIVER}
      - SMTP_SERVER=${SMTP_SERVER}
      - SECRET_KEY=${SECRET_KEY}
      - INTOUCH_TOKEN=${INTOUCH_TOKEN}
      - INTOUCH_URL=${INTOUCH_URL}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - AD_USERNAME=${AD_USERNAME}
      - AD_PASSWORD=${AD_PASSWORD}
      - AD_SERVER=${AD_SERVER}
      - AD_DOMAIN=${AD_DOMAIN}
      - AD_BASE_DN=${AD_BASE_DN}
      - DISABLED_OU=${DISABLED_OU}
      - TURNSTILE_A_URL=${TURNSTILE_A_URL}
      - TURNSTILE_B_URL=${TURNSTILE_B_URL}
      - TURNSTILE_A_SESSION=${TURNSTILE_A_SESSION}
      - TURNSTILE_B_SESSION=${TURNSTILE_B_SESSION}
    volumes:
      - offboarding_data:/app/data
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    networks:
      - internal
    ports:
      - "8086:80"
    volumes:
      - ./nginx_proxy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - offboarding
    restart: always

networks:
  internal:
    driver: bridge

volumes:
  offboarding_data: